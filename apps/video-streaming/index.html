<!DOCTYPE html>
<html>

<head>
    <title> Video Upload</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <form action="http://localhost:3000/upload/video" method="post" enctype="multipart/form-data">
        <input type="file" name="video" />
        <button type="submit">Upload</button>
    </form>
    <h4>
        <a href="http://localhost:3000/videos">View uploaded Videos &nbsp; <i class="fa fa-play-circle" style="font-size:20px;color:black"></i></a>
    </h4>
</body>

</html>
